<div class="modal-backdrop" [class.closing]="isClosing" (click)="close()">
    <div class="modal-content" [class.closing]="isClosing" (click)="$event.stopPropagation()">
        <!-- ✅ Heading -->
        <h2 class="modal-heading">
            💬 माँ का संदेश
        </h2>
        <video #videoPlayer controls autoplay class="modal-video" (ended)="onVideoEnd()">
            <source src="assets/videos/maa-message.mp4" type="video/mp4">
        </video>
        <button class="close-btn" (click)="close()">✕</button>
    </div>
</div>

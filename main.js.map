<!-- <app-family-tree-loader [ancestors]="dataSource.data" [(isLoading)]="isLoading"></app-family-tree-loader> -->
<!-- 📊 EVENTS TOOLBAR -->
<div class="family-events-toolbar single-row">

    <!-- LEFT -->
    <button class="back-btn" (click)="goBack()">
        ⬅ Back
    </button>

    <!-- CENTER -->
    <div class="center-links">
        <a href="javascript:void(0)" class="event-link" (click)="openDobModal($event)">
            📅 <span>All DoBs</span>
        </a>

        <span class="vertical-separator"></span>

        <a href="javascript:void(0)" class="event-link death" (click)="openDodModal($event)">
            🕯️ <span>All DoDs</span>
        </a>

        <span class="vertical-separator"></span>

        <a href="javascript:void(0)" class="event-link anniversary" (click)="openAnniversaryModal($event)">
            💍 <span>All Anniversaries</span>
        </a>
    </div>

    <!-- RIGHT -->
    <button class="maa-message-btn" (click)="openWelcomeModal()">
        💬 माँ का संदेश
    </button>

</div>
<div class="tree-container" [class.blurred]="previewData?.url || activeModal === 'dob' || activeModal === 'dod'"
    (mouseover)="onMouseOver($event)" (mouseout)="onMouseOut()">
    <div class="family-tree" #treeExportTarget>
        <ng-container *ngFor="let root of dataSource.data">
            <app-family-node [member]="root"></app-family-node>
        </ng-container>
    </div>
</div>

<div class="global-preview-overlay" *ngIf="previewData?.url">
    <img [src]="previewData!.url" alt="Family Preview" class="preview-img" [class.small-preview]="previewData!.isSmall">
</div>

<div class="events-modal-backdrop"
    *ngIf="activeModal === 'dob' || activeModal === 'dod' || activeModal === 'anniversary'" (click)="closeDateModal()">
    <div class="events-modal" (click)="onModalClick($event)" (mouseover)="onMouseOver($event)"
        (mouseout)="onMouseOut()">
        <button class="close-button" (click)="closeDateModal()" aria-label="Close">&times;</button>
        <h2>
            {{ modalTitle }}
        </h2>
        <div class="modal-scroll-area">
            <ng-container *ngIf="activeModal === 'dob'">
                <div *ngFor="let month of getOrderedMonths(groupedBirthdays)" class="month-section">
                    <h3>{{ month }}</h3>
                    <div *ngFor="let day of groupedBirthdays[month] | keyvalue" class="event-row">
                        <strong class="event-date">{{ day.key }}</strong>
                        <div class="event-member-container">
                            <div *ngFor="let person of $any(day.value); let last = last" class="event-member-item">
                                <img *ngIf="person.image" [src]="person.image" class="small-member-pic" alt="">
                                <span class="member-name">{{ person.name }}{{!last ? ',' : ''}}</span>
                            </div>
                        </div>
                    </div>
                </div>
            </ng-container>

            <ng-container *ngIf="activeModal === 'dod'">
                <div *ngFor="let month of getOrderedMonths(groupedDeathdays)" class="month-section">
                    <h3>{{ month }}</h3>
                    <div *ngFor="let day of groupedDeathdays[month] | keyvalue" class="event-row">
                        <strong class="event-date">{{ day.key }}</strong>
                        <div class="event-member-container">
                            <div *ngFor="let person of $any(day.value); let last = last" class="event-member-item">
                                <img *ngIf="person.image" [src]="person.image" class="small-member-pic" alt="">
                                <span class="member-name">{{ person.name }}{{!last ? ',' : ''}}</span>
                            </div>
                        </div>
                    </div>
                </div>
            </ng-container>

            <ng-container *ngIf="activeModal === 'anniversary'">
                <div *ngFor="let month of getOrderedMonths(groupedAnniversaries)" class="month-section">
                    <h3>{{ month }}</h3>
                    <div *ngFor="let day of groupedAnniversaries[month] | keyvalue" class="event-row">
                        <strong class="event-date">{{ day.key }}</strong>
                        <div class="event-member-container">
                            <div *ngFor="let person of $any(day.value); let last = last" class="event-member-item">
                                <img *ngIf="person.image" [src]="person.image" class="small-member-pic" alt="">
                                <span class="member-name">{{ person.name }}{{!last ? ',' : ''}}</span>
                            </div>
                        </div>
                    </div>
                </div>
            </ng-container>
        </div>
    </div>
</div>
<app-welcome-modal *ngIf="showWelcomeModal" (closeModal)="closeWelcomeModal()">
</app-welcome-modal>
